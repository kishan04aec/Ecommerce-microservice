spring:
  application:
    name: product-service

  h2:
    console:
      enabled: true
#  datasource:
#    url: jdbc:mysql://localhost:3307/aditya
#    username: aditya
#    password: aditya

#      local postgres configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/product
    username: ${DB_USER}
    password: ${DB_PASSWORD}




  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
#    database: mysql
#    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true


server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: "*"



eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
